<!DOCTYPE html>
<html>

<head>
  <title>CNC Tool</title>

  <style>
    body {
      font-family: Arial;
      background: #f0f0f0;
      padding: 40px;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 20px;
      max-width: 400px;
      margin: auto;
    }

    h1 {
      text-align: center;
    }

    .item {
      margin-top: 20px;
    }

    .title {
      color: gray;
      font-size: 14px;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="box">

    <h1>Tool Info</h1>

    <div class="item">
      <div class="title">Machine</div>
      <div class="value">CNC Milling</div>
    </div>

    <div class="item">
      <div class="title">Tool Type</div>
      <div class="value">End Mill</div>
    </div>

    <div class="item">
      <div class="title">Length</div>
      <div class="value">75 mm</div>
    </div>

    <div class="item">
      <div class="title">Teeth</div>
      <div class="value">4</div>
    </div>

    <div class="item">
      <div class="title">Holder</div>
      <div class="value">ER32</div>
    </div>

  </div>

</body>

</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CNC Tool</title>

  <style>
    body {
      font-family: Arial;
      background: #f3f4f6;
      padding: 20px;
    }

    .box {
      background: white;
      max-width: 450px;
      margin: auto;
      padding: 25px;
      border-radius: 20px;
    }

    h1 {
      text-align: center;
    }

    .item {
      margin-top: 18px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 12px;
    }

    .title {
      color: gray;
      font-size: 14px;
    }

    .value {
      font-size: 26px;
      font-weight: bold;
      margin-top: 5px;
    }

    select, input {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid #aaa;
      margin-top: 8px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      border: none;
      background: black;
      color: white;
      font-size: 18px;
      border-radius: 12px;
      cursor: pointer;
    }

    .admin {
      display: none;
    }

    .small-btn {
      background: #555;
      .tool-image {
  text-align: center;
  margin-bottom: 20px;
}

.tool-image img {
  width: 100%;
  border-radius: 16px;
  max-height: 220px;
  object-fit: cover;
}
      font-size: 15px;
    }
  </style>
</head>

<body>

  <div class="box">

    <h1>Tool Information</h1>
<div class="tool-image">
  <img id="toolImage"
       src="https://via.placeholder.com/300x200?text=CNC+TOOL"
       alt="Tool Image">
</div>
<div class="item">
  <div class="title">Machine | מכונה</div>
  <div class="value" id="showMachine">VF-3</div>

  <select class="admin" id="machine">
    <option>VF-3</option>
    <option>VF-2</option>
    <option>VF-4</option>
    <option>CNC Milling</option>
    <option>CNC Turning</option>
  </select>
</div>

<div class="item">
  <div class="title">Tool Number | מספר כלי</div>
  <div class="value" id="showToolNumber">T14</div>

  <input class="admin" id="toolNumber" value="T14">
</div>

<div class="item">
  <div class="title">Tool Type | סוג כלי</div>
  <div class="value" id="showToolType">End Mill</div>

  <select class="admin" id="toolType">

    <option>End Mill</option>
    <option>End Mill Super Face</option>
    <option>Ball Nose</option>
    <option>Corner Radius</option>
    <option>Face Mill</option>
    <option>Shell Mill</option>
    <option>Chamfer Mill</option>
    <option>Thread Mill</option>
    <option>Slot Mill</option>
    <option>T-Slot Cutter</option>
    <option>Dovetail Cutter</option>
    <option>Woodruff Cutter</option>
    <option>Fly Cutter</option>

    <option>Drill</option>
    <option>Center Drill</option>
    <option>Spot Drill</option>
    <option>Gun Drill</option>
    <option>Step Drill</option>

    <option>Reamer</option>
    <option>Boring Bar</option>
    <option>Counterbore</option>
    <option>Countersink</option>

    <option>Tap</option>
    <option>Thread Former</option>

    <option>Grooving Tool</option>
    <option>Parting Tool</option>
    <option>Turning Tool</option>

    <option>Insert Tool</option>
    <option>Carbide Insert</option>

    <option>Probe</option>
    <option>Engraving Tool</option>

    <option>Diamond Tool</option>
    <option>HSS Cutter</option>
    <option>Carbide Cutter</option>

    <option>Custom Tool</option>

  </select>
</div>

<div class="item">
  <div class="title">Diameter | קוטר</div>
  <div class="value" id="showDiameter">10 mm</div>

  <input class="admin" id="diameter" placeholder="10 mm">
</div>

<div class="item">
  <div class="title">Tool Length | אורך כלי</div>
  <div class="value" id="showToolLength">75 mm</div>

  <input class="admin" id="toolLength" placeholder="75 mm">
</div>

<div class="item">
  <div class="title">Teeth | שיניים</div>
  <div class="value" id="showTeeth">4</div>

  <select class="admin" id="teeth">
    <option>1</option>
    <option>2</option>
    <option>3</option>
    <option>4</option>
    <option>5</option>
    <option>6</option>
  </select>
</div>

<div class="item">
  <div class="title">Total Length With Holder | אורך כולל עם הולדר</div>
  <div class="value" id="showTotalLength">120 mm</div>

  <input class="admin" id="totalLength" placeholder="120 mm">
</div>

<div class="item">
  <div class="title">Holder Type | סוג הולדר</div>
  <div class="value" id="showHolder">ER32</div>

  <select class="admin" id="holder">
    <option>ER16</option>
    <option>ER20</option>
    <option>ER25</option>
    <option>ER32</option>
    <option>ER40</option>
    <option>Side Lock</option>
    <option>Hydraulic</option>
  </select>
</div>
<div class="item">
  <div class="title">Image URL | קישור תמונה</div>

  <input class="admin"
         id="imageUrl"
         placeholder="Paste image link here">
</div>
<button class="admin" onclick="saveData()">Save Changes</button>

<button class="small-btn" onclick="adminLogin()">
  Admin Login
</button>

  </div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCpFul8SVzrKAffWpPhDHjQoobJ8gnwazo",
    authDomain: "cnc-tools-33edd.firebaseapp.com",
    projectId: "cnc-tools-33edd",
    storageBucket: "cnc-tools-33edd.firebasestorage.app",
    messagingSenderId: "847482467099",
    appId: "1:847482467099:web:ab901c55df0b48293f59be"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const PASSWORD = "1234";
  const urlParams = new URLSearchParams(window.location.search);
const currentTool = urlParams.get("tool") || "T14";

const toolRef = doc(db, "tools", currentTool);
  async function loadData() {
    const snap = await getDoc(toolRef);

    const data = snap.exists() ? snap.data() : {
      toolNumber: "T14",
      machine: "VF-3",
      toolType: "End Mill",
      toolLength: "75 mm",
      teeth: "4",
      holder: "ER32",
      totalLength: "120 mm",
     diameter: "10 mm",

image: "https://via.placeholder.com/300x200"
    };

    document.getElementById("showToolNumber").innerText = data.toolNumber;
    document.getElementById("showMachine").innerText = data.machine;
    document.getElementById("showToolType").innerText = data.toolType;
    document.getElementById("showToolLength").innerText = data.toolLength;
    document.getElementById("showTeeth").innerText = data.teeth;
    document.getElementById("showHolder").innerText = data.holder;
    document.getElementById("showTotalLength").innerText = data.totalLength;
    document.getElementById("showDiameter").innerText = data.diameter;
document.getElementById("toolImage").src = data.image;

document.getElementById("imageUrl").value = data.image;
    document.getElementById("toolNumber").value = data.toolNumber;
    document.getElementById("machine").value = data.machine;
    document.getElementById("toolType").value = data.toolType;
    document.getElementById("toolLength").value = data.toolLength;
    document.getElementById("teeth").value = data.teeth;
    document.getElementById("holder").value = data.holder;
    document.getElementById("totalLength").value = data.totalLength;
    document.getElementById("diameter").value = data.diameter;
  }

  window.adminLogin = function () {
    const pass = prompt("أدخل كلمة السر");

    if (pass === PASSWORD) {
      document.querySelectorAll(".admin").forEach(item => {
        item.style.display = "block";
      });
      alert("تم فتح وضع الإدارة");
    } else {
      alert("كلمة السر خطأ");
    }
  }

  window.saveData = async function () {
    await setDoc(toolRef, {
      toolNumber: document.getElementById("toolNumber").value,
      machine: document.getElementById("machine").value,
      toolType: document.getElementById("toolType").value,
      toolLength: document.getElementById("toolLength").value,
      teeth: document.getElementById("teeth").value,
      holder: document.getElementById("holder").value,
      totalLength: document.getElementById("totalLength").value,
      diameter: document.getElementById("diameter").value,

image: document.getElementById("imageUrl").value
    });

    await loadData();
    alert("تم حفظ التعديلات على Firebase");
  }

  loadData();
</script>
  

</body>
</html>
